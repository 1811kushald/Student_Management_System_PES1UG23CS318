<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System By PES1UG23CS318</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>Student Registration Form by PES1UG23CS318</h2>
    <form id="studentForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" required> </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required> </div>
        <div class="form-group">
            <label>Course:</label>
            <input type="text" id="course" required> </div>
        <button type="submit">Submit</button> </form>

    <h2>Student List</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th> <th>Name</th> <th>Email</th> <th>Course</th> </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

    <script>
        // Data must be fetched from database [cite: 23]
        async function fetchStudents() {
            const response = await fetch('/api/students');
            const students = await response.json();
            const tableBody = document.getElementById('studentTableBody');
            tableBody.innerHTML = '';
            
            students.forEach(student => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.email}</td>
                        <td>${student.course}</td>
                    </tr>
                `;
            });
        }

        // Handle form submission
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const studentData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course: document.getElementById('course').value
            };

            const response = await fetch('/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            });

            if (response.ok) {
                alert("Student added successfully!");
                document.getElementById('studentForm').reset();
                fetchStudents(); // Table must update after each insert 
            } else {
                const errorText = await response.text();
                alert("Error: " + errorText);
            }
        });

        // Load students when the page loads
        window.onload = fetchStudents;
    </script>
</body>
</html>
